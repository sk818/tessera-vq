# 100 canonical 10 km x 10 km bounding boxes for the Tessera VQ Phase 3 RVQ sweep.
#
# Each entry is a (lon, lat) tile center on the Tessera 0.1-degree grid; the
# bounding box is +/- 0.045 deg around the center, which is ~10 km square in
# metres at the equator and shrinks longitudinally toward the poles. All coords
# end in .X5 so the +/- 0.045 deg box sits comfortably inside a single 0.1 deg
# Tessera tile and never straddles a tile edge.
#
# Path selection at sweep time: the script probes zarr coverage per bbox via
# tessera_vq.zarr_utils.probe_zarr_coverage. If covered, it reads a native
# 1000x1000 UTM window via tessera_vq.data._read_window_native (exact shape,
# no reprojection). If not, it falls back to tessera_vq.data.read_region's
# bbox path, which returns an EPSG:4326-reprojected mosaic of approximately
# 1000 x variable pixels by latitude. The actual shape used per bbox is
# recorded in the output CSV; histograms are normalised to per-bbox density
# (sum to 1) so mixing different-sized bboxes does not bias the cross-bbox
# mean.
#
# Pilot order: first 5 entries cover 5 continents (SA/AF/EU/NA/OC) and 5
# distinct biomes (rainforest, savanna, pastoral, cropland, desert) so a pilot
# run tells you whether the sweep is meaningful globally, not just within one
# biome. HALT after the pilot for supervisor review before the remaining 95.

version: 1
created_utc: "2026-06-02"
seed_default: 42

