# Tessera VQ — runtime configuration
#
# All paths and parameters live here. Scripts read from this file; nothing
# is hard-coded. Replace every <FILL IN> placeholder before running Phase 1.
#
# Edits to this file should be committed with a clear message:
#   `config: <what changed> for <reason>`

# -----------------------------------------------------------------------------
# Data paths
# -----------------------------------------------------------------------------
paths:
  # NOTE: Tessera embeddings are NOT addressed by a path/URI here. They are fetched
  # via the geotessera package; see the `tessera:` section below.

  # DEFERRED / out of current scope: needed only for the downstream phases
  # (Phases 5-6), which are NOT part of the current diagnostics + reconstruction
  # study. Path to Frank Feng's evaluation harness; aligns splits/probe protocols.
  frank_eval_repo: "<FILL IN>"

  # Where to write intermediate Parquet outputs.
  results_dir: "results"

  # Where to write figures.
  figures_dir: "figures"

  # Where to write text logs.
  logs_dir: "logs"

# -----------------------------------------------------------------------------
# Tessera embeddings — accessed via the geotessera package, not s3/gs/azure.
# https://github.com/ucam-eo/geotessera  (requires Python >= 3.12)
# -----------------------------------------------------------------------------
tessera:
  source: geotessera
  # Default embedding year for Pool A diagnostics and any downstream task that
  # does not set its own `year`.
  year: 2024
  # Read path. PRIMARY: geotessera's cloud-native zarr store (GeoTesseraZarr),
  # reached through zarr_utils vendored from ucam-eo/tee, via ranged reads (no
  # whole-tile download). Zarr is NOT globally available, so coverage is probed
  # per location (zarr_utils.probe_zarr_coverage). FALLBACK (not skip): where
  # zarr has no data, read via geotessera's bounding-box API
  # (gt.fetch_mosaic_for_region; gt.sample_embeddings_at_points for points).
  # Both paths return (H, W, 128) float32 in EPSG:4326 with NaN nodata.
  # Embeddings are never persisted to disk.
  access: zarr_then_bbox
  zarr_url: "https://dl2.geotessera.org/zarr/v2/store.zarr"  # recorded for provenance
  cache_dir: null   # geotessera local cache; null -> ~/.cache/geotessera

# -----------------------------------------------------------------------------
# Pool A — encoder diagnostics, never used for downstream eval
#
# Land only: window/point locations are drawn from geotessera's available
# coverage (registry.get_available_embeddings) for tessera.year, which exists
# only on land — so no sea samples. No biome stratification. Nothing is
# persisted: isotropy points and each window are read, used, and discarded.
# -----------------------------------------------------------------------------
pool_a:
  sampling: random_land            # locations drawn from geotessera land coverage
  # Reconstruction/compression sweeps (Phases 3-4): contiguous windows read one
  # at a time; VQ effectiveness computed in memory, then the window is discarded.
  n_windows: 1000
  window_px: 1024                  # ~0.1 deg box; single zarr read (region < 0.2 deg)
  subtiles_per_window: 16          # random sub-tiles evaluated per tile size, per window
  max_nan_fraction: 0.5            # drop NaN (water/nodata) pixels; re-sample window if exceeded
  # Isotropy (Phase 2): collect this many random land pixels per window in the
  # SAME streaming pass; total = n_windows x isotropy_points_per_window (= phase1.n_embeddings).
  isotropy_points_per_window: 100

# -----------------------------------------------------------------------------
# Parameter grid
# -----------------------------------------------------------------------------
grid:
  tile_sizes: [16, 64, 256, 1024]   # 1024 = whole window; 16/64/256 carved from it
  k_values: [2, 4, 8, 16, 32, 64, 128, 256]
  # Tested at k=16 and k=64 only; the winner is propagated to the rest.
  # See Phase 3 in docs/spec.md.
  clustering_distance_candidates: [euclidean, cosine]
  # Filled in by Phase 3 task 4 after the head-to-head; do not set manually.
  clustering_distance_chosen: null

# -----------------------------------------------------------------------------
# Intrinsic per-tile heterogeneity (replaces biome stratification/breakdown).
# Characterises regimes where VQ helps vs not, with no external labels.
# -----------------------------------------------------------------------------
heterogeneity:
  metric: index_entropy      # one of: index_entropy, n_distinct_prototypes, embedding_spread
  reference_k: 16            # k at which index-based heterogeneity is computed
  n_bins: 5                  # quantile bins for the per-regime breakdown

# -----------------------------------------------------------------------------
# Downstream tasks — DEFERRED (Phases 5-6), out of the current scope.
#
# The current study (metric, tile size, k) is independent of downstream tasks and
# needs neither these nor `frank_eval_repo`. Kept for when downstream resumes:
# embeddings fetched from geotessera by region/year; splits/labels from
# `root` + `split_protocol`; `year: null` falls back to `tessera.year`.
# -----------------------------------------------------------------------------
tasks:
  pastis:
    root: "<FILL IN>"                   # label/geometry dataset; splits via frank harness
    year: null
    split_protocol: frank_default       # uses Frank's harness
    metric: macro_f1
    task_type: classification
  treesatai:
    root: "<FILL IN>"
    year: null
    split_protocol: frank_default
    metric: macro_f1
    task_type: classification
  borneo:
    root: "<FILL IN>"
    year: null
    split_protocol: frank_default
    metric: miou
    task_type: classification
  austrian_crops:
    root: "<FILL IN>"
    year: null
    split_protocol: robinson_corley     # logistic regression with C tuned on val
    metric: macro_f1
    task_type: classification
  haweswater:
    root: "<FILL IN>"
    year: null
    split_protocol: robinson_corley
    metric: macro_f1
    task_type: classification

# -----------------------------------------------------------------------------
# Compute
# -----------------------------------------------------------------------------
compute:
  n_jobs: -1                            # joblib parallelism
  max_wall_hours_per_phase: 8
  use_gpu: false                        # set true if Frank's protocol needs it
  device: "cpu"                         # or "cuda:0"

# -----------------------------------------------------------------------------
# Seeds
# -----------------------------------------------------------------------------
seeds:
  global: 42
  pool_a_sampling: 42
  random_projections: 43
  kmeans: 44
  probe_training: 45

# -----------------------------------------------------------------------------
# Phase 1 — isotropy diagnostics
# -----------------------------------------------------------------------------
phase1:
  # 100 land points per window x pool_a.n_windows = 100,000 points, collected in
  # the same streaming pass as the reconstruction sweep.
  n_embeddings: 100000
  n_directions: 200
  alpha: 0.01
  near_collapsed_variance_ratio: 0.01   # flag dims with var < this × median

# -----------------------------------------------------------------------------
# Phase 2 — reconstruction sweep
# -----------------------------------------------------------------------------
phase2:
  wasserstein_n_projections: 200
  quantiles: [0.1, 0.5, 0.9, 0.99]
  target_cosine_p95: 0.1
  target_l2_p95: null                   # set after Phase 1 if Tessera is Gaussian

# -----------------------------------------------------------------------------
# Phase 3 — index compression
# -----------------------------------------------------------------------------
phase3:
  zstd_level: 19
  pipelines: [A, B, C, D, E, F, G]      # see spec for definitions

# -----------------------------------------------------------------------------
# Phase 4 — downstream probes
# -----------------------------------------------------------------------------
phase4:
  probe_C_grid: [0.001, 0.01, 0.1, 1.0, 10.0, 100.0]
  configs:
    - raw_float32
    - int8
    - pca32_int8
    - binary
    - vq_k16
    - vq_k64
    - vq_k256
    - pca32_vq_k16

# -----------------------------------------------------------------------------
# GitHub
# -----------------------------------------------------------------------------
github:
  org: "sk818"                          # personal GitHub account
  repo: "tessera-vq"
  visibility: private                   # never change without supervisor approval
